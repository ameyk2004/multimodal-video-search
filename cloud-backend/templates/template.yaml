AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Multimodal Guru Video Search - Serverless Backend
  Provides a REST API that accepts English or Marathi queries,
  generates BGE-M3 embeddings via HuggingFace, and performs
  semantic search against the Qdrant vector database.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12

Parameters:
  QdrantUrl:
    Type: String
    Description: The Qdrant Cloud cluster URL
  QdrantApiKey:
    Type: String
    Description: The Qdrant Cloud API key
    NoEcho: true
  HfApiKey:
    Type: String
    Description: The HuggingFace Inference API key
    NoEcho: true
  GeminiApiKey:
    Type: String
    Description: The Google Gemini API key
    NoEcho: true
  DynamoDbTableName:
    Type: String
    Description: Name of the DynamoDB table for video metadata
    Default: sadhananandadeep-content
  UiArtifactsBucket:
    Type: String
    Description: Name of the artifacts bucket where the UI is uploaded before deploy

Resources:
  # ── DynamoDB: Video-level metadata (topics, queries, stories) ──────────────
  SadhanaNandadeepMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDbTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: video_id
          AttributeType: S
      KeySchema:
        - AttributeName: video_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: PetheKaka
  SadhanaNandadeepSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/similarity_search/
      Handler: index.lambda_handler
      Description: Performs semantic search over Guru video transcripts
      Environment:
        Variables:
          QDRANT_URL: !Ref QdrantUrl
          QDRANT_API_KEY: !Ref QdrantApiKey
          HF_API_KEY: !Ref HfApiKey
          GEMINI_API_KEY: !Ref GeminiApiKey
          COLLECTION_NAME: guru-videos-hybrid
          DYNAMODB_TABLE: !Ref DynamoDbTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDbTableName
      Events:
        SearchApiEvent:
          Type: Api
          Properties:
            Path: /search
            Method: get
            RestApiId: !Ref SadhanaNandadeepApi

  SadhanaNandadeepStoriesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/get_stories/
      Handler: index.lambda_handler
      Description: Fetches all stories from DynamoDB
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDbTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDbTableName
      Events:
        GetStoriesApi:
          Type: Api
          Properties:
            Path: /stories
            Method: get
            RestApiId: !Ref SadhanaNandadeepApi

  SadhanaNandadeepLibraryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/library_api/
      Handler: index.lambda_handler
      Description: Library APIs for videos and video details
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDbTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDbTableName
      Events:
        GetVideosApi:
          Type: Api
          Properties:
            Path: /videos
            Method: get
            RestApiId: !Ref SadhanaNandadeepApi
        GetVideoDetailsApi:
          Type: Api
          Properties:
            Path: /videos/{videoId}
            Method: get
            RestApiId: !Ref SadhanaNandadeepApi
        GetVideoTopicsApi:
          Type: Api
          Properties:
            Path: /videos/{videoId}/topics
            Method: get
            RestApiId: !Ref SadhanaNandadeepApi
        GetVideoQuestionsApi:
          Type: Api
          Properties:
            Path: /videos/{videoId}/questions
            Method: get
            RestApiId: !Ref SadhanaNandadeepApi
        GetMusicApi:
          Type: Api
          Properties:
            Path: /music
            Method: get
            RestApiId: !Ref SadhanaNandadeepApi

  SadhanaNandadeepApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # ── Static Website Bucket for Frontend ─────────────────────────────────────
  SadhanaNandadeepUiBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "sadhananandadeep-ui-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  SadhanaNandadeepUiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SadhanaNandadeepUiBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub "${SadhanaNandadeepUiBucket.Arn}/*"

  # ── CloudFront Distribution for UI ─────────────────────────────────────────
  SadhanaNandadeepCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        Origins:
          - Id: S3WebsiteOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt SadhanaNandadeepUiBucket.WebsiteURL]]
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              HTTPSPort: 443
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300

  # ── Custom Resource to Write config.json ──────────────────────────────────
  SadhanaNandadeepConfigWriterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/dashboard_initiator/
      Handler: app.handler
      Description: Custom resource to write config.json to UI S3 bucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SadhanaNandadeepUiBucket
        - S3ReadPolicy:
            BucketName: !Ref UiArtifactsBucket

  SadhanaNandadeepConfigWriterResource:
    Type: Custom::ConfigWriter
    Properties:
      ServiceToken: !GetAtt SadhanaNandadeepConfigWriterFunction.Arn
      BucketName: !Ref SadhanaNandadeepUiBucket
      ArtifactsBucket: !Ref UiArtifactsBucket
      ApiUrl: !Sub "https://${SadhanaNandadeepApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

Outputs:
  ApiUrl:
    Description: The Base URL of the API Gateway
    Value: !Sub "https://${SadhanaNandadeepApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  CloudFrontURL:
    Description: The HTTPS URL of the CloudFront Distribution
    Value: !Sub "https://${SadhanaNandadeepCloudFront.DomainName}"
  CloudFrontDistributionId:
    Description: The ID of the CloudFront Distribution
    Value: !Ref SadhanaNandadeepCloudFront
  SearchGuruFunctionArn:
    Description: ARN of the Search Lambda function
    Value: !GetAtt SadhanaNandadeepSearchFunction.Arn
  VideoMetadataTableName:
    Description: Name of the DynamoDB video metadata table
    Value: !Ref SadhanaNandadeepMetadataTable
  VideoMetadataTableArn:
    Description: ARN of the DynamoDB video metadata table
    Value: !GetAtt SadhanaNandadeepMetadataTable.Arn
  UiBucketName:
    Description: Name of the S3 bucket hosting the UI
    Value: !Ref SadhanaNandadeepUiBucket
  WebsiteURL:
    Description: URL of the frontend static website
    Value: !Sub "http://${SadhanaNandadeepUiBucket}.s3-website-${AWS::Region}.amazonaws.com"
