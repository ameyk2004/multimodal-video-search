AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Multimodal Guru Video Search - Serverless Backend
  Provides a REST API that accepts English or Marathi queries,
  generates BGE-M3 embeddings via HuggingFace, and performs
  semantic search against the Qdrant vector database.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12

Parameters:
  QdrantUrl:
    Type: String
    Description: The Qdrant Cloud cluster URL
  QdrantApiKey:
    Type: String
    Description: The Qdrant Cloud API key
    NoEcho: true
  HfApiKey:
    Type: String
    Description: The HuggingFace Inference API key
    NoEcho: true
  DynamoDbTableName:
    Type: String
    Description: Name of the DynamoDB table for video metadata
    Default: guru-video-metadata
  UiArtifactsBucket:
    Type: String
    Description: Name of the artifacts bucket where the UI is uploaded before deploy

Resources:
  # ── DynamoDB: Video-level metadata (topics, queries, stories) ──────────────
  VideoMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDbTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: video_id
          AttributeType: S
      KeySchema:
        - AttributeName: video_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: PetheKaka
  SearchGuruFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/similarity_search/
      Handler: index.lambda_handler
      Description: Performs semantic search over Guru video transcripts
      Environment:
        Variables:
          QDRANT_URL: !Ref QdrantUrl
          QDRANT_API_KEY: !Ref QdrantApiKey
          HF_API_KEY: !Ref HfApiKey
          COLLECTION_NAME: guru-videos
          DYNAMODB_TABLE: !Ref DynamoDbTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDbTableName
      Events:
        SearchApi:
          Type: Api
          Properties:
            Path: /search
            Method: get
            RestApiId: !Ref SearchApi

  GetStoriesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/get_stories/
      Handler: index.lambda_handler
      Description: Fetches all stories from DynamoDB
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDbTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDbTableName
      Events:
        GetStoriesApi:
          Type: Api
          Properties:
            Path: /stories
            Method: get
            RestApiId: !Ref SearchApi

  SearchApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # ── Static Website Bucket for Frontend ─────────────────────────────────────
  UiBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  UiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UiBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub "${UiBucket.Arn}/*"

  # ── Custom Resource to Write config.json ──────────────────────────────────
  DashboardInitiatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/dashboard_initiator/
      Handler: app.handler
      Description: Custom resource to write config.json to UI S3 bucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UiBucket
        - S3ReadPolicy:
            BucketName: !Ref UiArtifactsBucket

  WriteConfigResource:
    Type: Custom::ConfigWriter
    Properties:
      ServiceToken: !GetAtt DashboardInitiatorFunction.Arn
      BucketName: !Ref UiBucket
      ArtifactsBucket: !Ref UiArtifactsBucket
      ApiUrl: !Sub "https://${SearchApi}.execute-api.${AWS::Region}.amazonaws.com/prod/search"

Outputs:
  SearchApiUrl:
    Description: The URL of the search API endpoint
    Value: !Sub "https://${SearchApi}.execute-api.${AWS::Region}.amazonaws.com/prod/search"
  SearchGuruFunctionArn:
    Description: ARN of the Search Lambda function
    Value: !GetAtt SearchGuruFunction.Arn
  VideoMetadataTableName:
    Description: Name of the DynamoDB video metadata table
    Value: !Ref VideoMetadataTable
  VideoMetadataTableArn:
    Description: ARN of the DynamoDB video metadata table
    Value: !GetAtt VideoMetadataTable.Arn
  UiBucketName:
    Description: Name of the S3 bucket hosting the UI
    Value: !Ref UiBucket
  WebsiteURL:
    Description: URL of the frontend static website
    Value: !Sub "http://${UiBucket}.s3-website-${AWS::Region}.amazonaws.com"
