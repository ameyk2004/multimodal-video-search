AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Multimodal Guru Video Search - Serverless Backend
  Provides a REST API that accepts English or Marathi queries,
  generates BGE-M3 embeddings via HuggingFace, and performs
  semantic search against the Qdrant vector database.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12

Parameters:
  QdrantUrl:
    Type: String
    Description: The Qdrant Cloud cluster URL
  QdrantApiKey:
    Type: String
    Description: The Qdrant Cloud API key
    NoEcho: true
  HfApiKey:
    Type: String
    Description: The HuggingFace Inference API key
    NoEcho: true
  DynamoDbTableName:
    Type: String
    Description: Name of the DynamoDB table for video metadata
    Default: guru-video-metadata

Resources:
  # ── DynamoDB: Video-level metadata (topics, queries, stories) ──────────────
  VideoMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDbTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: video_id
          AttributeType: S
      KeySchema:
        - AttributeName: video_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: PetheKaka
  SearchGuruFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/similarity_search/
      Handler: index.lambda_handler
      Description: Performs semantic search over Guru video transcripts
      Environment:
        Variables:
          QDRANT_URL: !Ref QdrantUrl
          QDRANT_API_KEY: !Ref QdrantApiKey
          HF_API_KEY: !Ref HfApiKey
          COLLECTION_NAME: guru-videos
          DYNAMODB_TABLE: !Ref DynamoDbTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDbTableName
      Events:
        SearchApi:
          Type: Api
          Properties:
            Path: /search
            Method: get
            RestApiId: !Ref SearchApi

  SearchApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # ── Static Website Bucket for Frontend ─────────────────────────────────────
  UiBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  UiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UiBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub "${UiBucket.Arn}/*"

  # ── Custom Resource to Write config.json ──────────────────────────────────
  ConfigWriterFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: S3WriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                Resource: !Sub "${UiBucket.Arn}/*"
        - PolicyName: BasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: '*'

  ConfigWriterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Timeout: 10
      Role: !GetAtt ConfigWriterFunctionRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request
          import urllib.error
          import boto3
          
          def send_cfn_response(event, context, response_status, response_data, physical_resource_id=None, no_echo=False):
              response_url = event['ResponseURL']
              print(response_url)
              response_body = {
                  'Status': response_status,
                  'Reason': 'See the details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'NoEcho': no_echo,
                  'Data': response_data
              }
              json_response_body = json.dumps(response_body).encode('utf-8')
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_response_body))
              }
              try:
                  req = urllib.request.Request(response_url, data=json_response_body, headers=headers, method='PUT')
                  with urllib.request.urlopen(req) as response:
                      print("Status code:", response.getcode())
              except Exception as e:
                  print("send(..) failed executing requests.put(..):", e)
          
          def handler(event, context):
              try:
                  request_type = event['RequestType']
                  if request_type == 'Delete':
                      send_cfn_response(event, context, 'SUCCESS', {})
                      return
                      
                  props = event['ResourceProperties']
                  bucket = props['BucketName']
                  api_url = props['ApiUrl']
                  
                  config_content = json.dumps({"VITE_API_URL": api_url})
                  s3 = boto3.client('s3')
                  s3.put_object(
                      Bucket=bucket,
                      Key='config.json',
                      Body=config_content,
                      ContentType='application/json',
                      CacheControl='no-cache'
                  )
                  
                  send_cfn_response(event, context, 'SUCCESS', {})
              except Exception as e:
                  print("Error:", e)
                  send_cfn_response(event, context, 'FAILED', {})

  WriteConfigResource:
    Type: Custom::ConfigWriter
    Properties:
      ServiceToken: !GetAtt ConfigWriterFunction.Arn
      BucketName: !Ref UiBucket
      ApiUrl: !Sub "https://${SearchApi}.execute-api.${AWS::Region}.amazonaws.com/prod/search"

Outputs:
  SearchApiUrl:
    Description: The URL of the search API endpoint
    Value: !Sub "https://${SearchApi}.execute-api.${AWS::Region}.amazonaws.com/prod/search"
  SearchGuruFunctionArn:
    Description: ARN of the Search Lambda function
    Value: !GetAtt SearchGuruFunction.Arn
  VideoMetadataTableName:
    Description: Name of the DynamoDB video metadata table
    Value: !Ref VideoMetadataTable
  VideoMetadataTableArn:
    Description: ARN of the DynamoDB video metadata table
    Value: !GetAtt VideoMetadataTable.Arn
  UiBucketName:
    Description: Name of the S3 bucket hosting the UI
    Value: !Ref UiBucket
  WebsiteURL:
    Description: URL of the frontend static website
    Value: !GetAtt UiBucket.WebsiteURL
